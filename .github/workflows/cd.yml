name: Continuous Deployment

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Install dependencies
        run: |
          flutter pub get

      - name: Build APK
        run: flutter build apk --release --obfuscate --split-debug-info=/tmp/debug-info

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wayrouter-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: |
            ## WayRouter APK Release

            ### Build Information
            - Branch: ${{ github.ref_name }}
            - Commit: ${{ github.sha }}
            - Date: ${{ github.event.head_commit.timestamp }}

            ### Download
            The APK artifact is available for download.
          draft: false
          prerelease: false

      - name: Upload to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./build/app/outputs/flutter-apk/app-release.apk
          asset_name: wayrouter.apk
          asset_content_type: application/android-package-archive
