name: Build APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.11.1"
          channel: "stable"

      - name: Verify Flutter installation
        run: |
          flutter doctor -v
          cd wayrouter && flutter pub get

      - name: Build APK
        run: |
          cd wayrouter && flutter build apk --release --obfuscate --split-debug-info=/tmp/debug-info

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wayrouter-apk
          path: wayrouter/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    steps:
      - name: Download APK Artifact
        uses: actions/download-artifact@v4
        with:
          name: wayrouter-apk
          path: wayrouter/build/app/outputs/flutter-apk/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: wayrouter/build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
