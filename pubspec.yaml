name: wayrouter
description: "WayRouter - Location tracking with background sensor collection and MongoDB storage"
publish_to: "none"
version: 1.0.0+10

environment:
  sdk: ^3.11.1

dependencies:
  device_info_plus: ^12.4.0
  flutter:
    sdk: flutter
  flutter_background_service: ^5.1.0
  flutter_compass: ^0.8.1
  flutter_map: ^8.3.0
  geolocator: ^14.0.2
  latlong2: ^0.9.1
  mongo_dart: ^0.10.8
  path: ^1.9.0
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  sensors_plus: ^7.0.0
  sqflite: ^2.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: "^0.13.1"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "public/icon.jpeg"

flutter:
  uses-material-design: true
